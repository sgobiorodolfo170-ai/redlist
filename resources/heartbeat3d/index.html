<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
  #stage { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="stage"></div>
<script src="three.min.js"></script>
<script src="heartbeat3d.js"></script>
<script>
  var heart = new HeartBeat3D('#stage', {
    bpm: 72, range: [30, 200], particles: 220,
    autoStart: false, rotationSpeed: 0.35, background: false
  });
  function setBPM(bpm) { heart.setBPM(bpm); }
  function startHeart() { heart.start(); }
  function stopHeart() { heart.stop(); }
  function isRunning() { return heart.isRunning(); }
</script>
</body>
</html>
