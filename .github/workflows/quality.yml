name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUTF8: "1"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install tools
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install core dependencies
        run: pip install pytest pytest-cov Pillow requests numpy
      - name: Run tests
        run: pytest -v --tb=short --cov=src --cov-report=term-missing
