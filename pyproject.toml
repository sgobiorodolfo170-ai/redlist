[tool.ruff]
target-version = "py38"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "N"]
ignore = ["N801", "N802", "N803", "N806", "N815", "N816"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
markers = [
    "heavy: marks tests that need heavy dependencies (PaddlePaddle, PyQt6)",
]


