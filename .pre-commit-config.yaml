repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: ["check", "--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports", "--no-strict-optional", "--follow-imports=skip", "--explicit-package-bases"]
        additional_dependencies: ["PyQt6"]
        exclude: ^tests/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.9
    hooks:
      - id: bandit
        args: ["-r", "src/", "-c", "pyproject.toml"]

  - repo: local
    hooks:
      - id: check-api-keys
        name: Check for API keys and secrets
        entry: python scripts/pre_commit_check_secrets.py
        language: python
        always_run: true
        pass_filenames: false
